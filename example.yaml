# Example configuration for consul-acl-sync.
# secret_id is a credential, so keep this file under sops and decrypt it to a
# temporary file for the run:
#
#   sops exec-file --no-fifo config.yaml 'consul-acl-sync -config {}'

policies:
  - name: web-read
    description: "Read access for the web app"
    rules: |
      key_prefix "web/" {
        policy = "read"
      }

  - name: config-write
    description: "Write access to shared config"
    rules: |
      key_prefix "config/" {
        policy = "write"
      }

tokens:
  # accessor_id is the identity key and secret_id is the credential. Both are
  # pinned so create is deterministic and re-runs stay idempotent.
  - accessor_id: 3b2a1c00-0000-4000-8000-000000000001
    secret_id: 9f1c7d00-0000-4000-8000-000000000001
    description: "web app token"
    policies:
      - web-read
